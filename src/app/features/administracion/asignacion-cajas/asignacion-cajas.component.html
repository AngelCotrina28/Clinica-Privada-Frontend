<app-header titulo="Modulo de Administracion" />

<main class="contenedor">
  <h2 class="subtitulo-seccion">Asignación de Cajas</h2>

  <div class="caja-filtros">
    <div class="grupo-busqueda">
      <input type="text" placeholder="Buscar por cajero o caja..." disabled>
    </div>
    <div class="grupo-acciones">
      <button type="button" class="btn-accion btn-primary" disabled>+ Nueva Asignacion</button>
    </div>
  </div>

  <div class="tabla-responsive">
    <table>
      <thead>
        <tr>
          <th>Cajero</th>
          <th>Caja</th>
          <th>Fecha Asignación</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td colspan="5" class="col-centrada">No hay asignaciones cargadas.</td>
        </tr>
      </tbody>
    </table>
  </div>
</main>
