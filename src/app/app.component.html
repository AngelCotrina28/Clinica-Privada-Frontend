<app-sidebar *ngIf="mostrarMenu" />

<div class="contenido-wrapper" [class.contenido-wrapper--login]="!mostrarMenu">
  <router-outlet />
</div>

@if (loadingService.isLoading$ | async) {
  <div class="global-loading-overlay">
    <div class="spinner-border text-primary spinner-global" role="status">
      <span class="sr-only"></span>
    </div>
  </div>
}
