<main class="login-page">
  <section class="login-shell">
    <div class="login-brand">
      <div class="login-brand__mark">
        <img src="/brand/logo-luz-del-tunel.png" alt="Luz del Tunel">
      </div>
      <div>
        <span>Luz del Tunel</span>
        <h1>Acceso al sistema</h1>
        <p>Gestion asistencial, administrativa y financiera en un solo entorno.</p>
      </div>
    </div>

    <form class="login-card" (ngSubmit)="onLogin()">
      <div class="login-card__header">
        <h2>Iniciar sesion</h2>
        <p>Ingresa tus credenciales institucionales.</p>
      </div>

      <div *ngIf="errorMessage" class="login-error">
        {{ errorMessage }}
      </div>

      <label for="username">
        Usuario
        <input
          type="text"
          id="username"
          name="username"
          [(ngModel)]="credentials.username"
          autocomplete="username"
          required>
      </label>

      <label for="password">
        Contrasena
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="credentials.password"
          autocomplete="current-password"
          required>
      </label>

      <button type="submit">Entrar</button>
    </form>
  </section>
</main>
