<header class="app-header">
  <div class="app-header__title">
    <span class="app-header__eyebrow">{{ fechaActual }}</span>
    <h1>{{ titulo }}</h1>
  </div>

  <ng-container *ngIf="usuarioActual$ | async as usuarioActual; else invitado">
    <div class="user-card">
      <div class="user-card__avatar" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path d="M12 12a4 4 0 1 0 0-8a4 4 0 0 0 0 8z"></path>
          <path d="M5 21a7 7 0 0 1 14 0"></path>
        </svg>
      </div>
      <div class="user-card__meta">
        <strong>{{ nombreVisible(usuarioActual) }}</strong>
        <span>{{ rolVisible(usuarioActual) }}</span>
      </div>
      <button type="button" class="logout-button" (click)="cerrarSesion()">Cerrar sesion</button>
    </div>
  </ng-container>

  <ng-template #invitado>
    <div class="user-card">
      <div class="user-card__avatar" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path d="M12 12a4 4 0 1 0 0-8a4 4 0 0 0 0 8z"></path>
          <path d="M5 21a7 7 0 0 1 14 0"></path>
        </svg>
      </div>
      <div class="user-card__meta">
        <strong>{{ nombreVisible(null) }}</strong>
        <span>{{ rolVisible(null) }}</span>
      </div>
      <button type="button" class="logout-button" (click)="cerrarSesion()">Cerrar sesion</button>
    </div>
  </ng-template>
</header>
