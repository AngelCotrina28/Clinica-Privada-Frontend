<app-header titulo="Modulo de Atencion Medica"></app-header>

<main class="contenedor atencion-shell">
  @if (pacienteActivo) {
    <section class="paciente-banner">
      <div class="paciente-avatar" aria-hidden="true">
        {{ pacienteActivo.nombreCompleto.charAt(0) }}
      </div>

      <div class="paciente-info">
        <span class="paciente-info__label">Paciente en atencion</span>
        <h2>{{ pacienteActivo.nombreCompleto }}</h2>
        <div class="paciente-meta">
          <span>DNI: {{ pacienteActivo.dniPaciente }}</span>
          <span>HC: {{ pacienteActivo.numeroHistoria }}</span>
        </div>
      </div>

      <button type="button" (click)="finalizarAtencion()" class="btn-finalizar">
        Finalizar atencion
      </button>
    </section>

    <nav class="tabs-clinicas" aria-label="Opciones de atencion medica">
      <a routerLink="historial-clinico" routerLinkActive="active">Consultar historial</a>
      <a routerLink="registro-resultados" routerLinkActive="active">Registrar resultados</a>
      <a routerLink="receta-medica" routerLinkActive="active">Emitir receta</a>
    </nav>
  }

  <section class="workspace-content">
    <router-outlet></router-outlet>
  </section>
</main>
