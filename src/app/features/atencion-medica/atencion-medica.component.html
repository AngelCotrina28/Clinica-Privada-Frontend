<app-header titulo="Modulo de Atencion Medica"></app-header>

<main class="contenedor">
  @if (pacienteActivo) {
  <div class="paciente-banner">
    <div class="paciente-info">
      <h2>{{ pacienteActivo.nombreCompleto }}</h2>
      <p>DNI: {{ pacienteActivo.dniPaciente }} | HC: {{ pacienteActivo.numeroHistoria }}</p>
    </div>
    <button (click)="finalizarAtencion()" class="btn-finalizar">Finalizar Atencion</button>
  </div>

  <nav class="tabs-clinicas">
    <a routerLink="historial-clinico" routerLinkActive="active">Historial Clinico</a>
    <a routerLink="registro-resultados" routerLinkActive="active">Registrar Resultados</a>
    <a routerLink="receta-medica" routerLinkActive="active">Emitir Receta</a>
  </nav>
  }

  <div class="workspace-content">
    <router-outlet></router-outlet>
  </div>
</main>
