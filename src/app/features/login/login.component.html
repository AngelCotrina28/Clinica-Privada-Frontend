<main class="login-page">
  <section class="login-shell">
    <div class="login-brand">
      <div class="login-brand__mark">
        <img src="/brand/logo-luz-del-tunel.png" alt="Clinica">
      </div>
      <div>
        <span>Clinica</span>
        <h1>Acceso al sistema</h1>
        <p>Gestion asistencial, administrativa y financiera en un solo entorno.</p>
      </div>
    </div>

    <form class="login-card" [formGroup]="loginForm" (ngSubmit)="onLogin()">
      <div class="login-card__header">
        <h2>Iniciar sesion</h2>
        <p>Ingresa tus credenciales institucionales.</p>
      </div>

      <div *ngIf="errorMessage" class="login-error">
        {{ errorMessage }}
      </div>

      <label for="username">
        Usuario
        <input type="text" id="username" formControlName="username" autocomplete="username">

        <span class="error-text"
          *ngIf="loginForm.get('username')?.touched && loginForm.get('username')?.hasError('required')">El usuario es
          obligatorio.</span>
        <span class="error-text" *ngIf="loginForm.get('username')?.hasError('pattern')">No se permiten espacios ni
          caracteres especiales.</span>
      </label>

      <label for="password">
        Contraseña
        <div class="password-wrapper">
          <input [type]="showPassword ? 'text' : 'password'" id="password" formControlName="password"
            autocomplete="current-password">

          <button type="button" class="toggle-password" (click)="togglePasswordVisibility()"
            [attr.aria-label]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'">
            @if (!showPassword) {
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
            }@else {
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path
                d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24">
              </path>
              <line x1="1" y1="1" x2="23" y2="23"></line>
            </svg>
            }
          </button>
        </div>
        <span class="error-text"
          *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.hasError('required')">La contraseña es
          obligatoria.</span>
      </label>

      <button type="submit" [disabled]="cargando">
        Entrar
        @if(cargando){
        <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
        }
      </button>

      <button class="btn btn-primary" type="button" disabled>
        <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
        Loading...
      </button>

    </form>
  </section>
</main>
