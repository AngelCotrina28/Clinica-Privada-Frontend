<app-header titulo="Modulo de Administracion" />

<main class="contenedor">
  <h2 class="subtitulo-seccion">Series de Comprobantes</h2>

  <div class="caja-filtros">
    <div class="grupo-busqueda">
      <input type="text" placeholder="Buscar por serie o tipo..." disabled>
    </div>
    <div class="grupo-acciones">
      <button type="button" class="btn-accion btn-primary" disabled>+ Nueva Serie</button>
    </div>
  </div>

  <div class="tabla-responsive">
    <table>
      <thead>
        <tr>
          <th>Tipo Documento</th>
          <th>Serie</th>
          <th>Número Actual</th>
          <th>Punto de Venta</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td colspan="6" class="col-centrada">No hay series cargadas.</td>
        </tr>
      </tbody>
    </table>
  </div>
</main>
