<header class="header-top">
  <h1>Módulo de Atención Médica</h1>
  <p>Usuario: Dr. Carlos Mendoza</p>
</header>

<main class="contenedor">

  <section>
    <h2 class="subtitulo-seccion">Registro de Resultados de Atención</h2>
    <form>
      <fieldset>
        <legend>Historia Clínica del Paciente Actual</legend>

        <label for="nro_cita">N° Cita / Orden:</label>
        <input type="text" id="nro_cita" name="nro_cita" value="CE-045" readonly>

        <label for="diagnostico">Diagnóstico (CIE-10):</label>
        <input type="text" id="diagnostico" name="diagnostico">

        <label for="notas_evolucion">Notas de Evolución:</label>
        <textarea id="notas_evolucion" name="notas_evolucion" rows="5"></textarea>

        <button type="submit">Guardar en Historia Clínica</button>
      </fieldset>
    </form>
  </section>

  <section>
    <h2 class="subtitulo-seccion">Emisión de Recetas Médicas</h2>
    <form>
      <fieldset>
        <legend>Receta Digital</legend>

        <label for="medicamento">Medicamento:</label>
        <input type="text" id="medicamento" name="medicamento" list="medicamentos_list">
        <datalist id="medicamentos_list">
          <option value="Paracetamol 500mg">
          <option value="Ibuprofeno 400mg">
          <option value="Amoxicilina 500mg">
        </datalist>

        <label for="dosis">Dosis e Indicaciones:</label>
        <input type="text" id="dosis" name="dosis">

        <button type="button">Añadir a la Receta</button>
      </fieldset>
    </form>

    <div class="tabla-responsive">
      <table>
        <thead>
          <tr>
            <th>Medicamento</th>
            <th>Indicaciones</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Paracetamol 500mg</td>
            <td>1 tableta cada 8 horas por 3 días</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="grupo-acciones">
      <button type="submit">Emitir Receta Digital</button>
    </div>
  </section>

</main>
