<app-header titulo="Resumen Operativo" />

<main class="dashboard-main">
  <section class="dashboard-hero">
    <div>
      <span>Panel institucional</span>
      <h2>Estado general de la clinica</h2>
    </div>
    <p>Indicadores rapidos para orientar la operacion diaria.</p>
  </section>

  <section class="dashboard-grid">
    @for (card of resumen; track card.titulo) {
      <article class="tarjeta-resumen">
        <span class="tarjeta-resumen__label">{{ card.titulo }}</span>
        <strong>{{ card.valor }}</strong>
        <p>{{ card.descripcion }} {{ card.sufijo }}</p>
      </article>
    }
  </section>
</main>
