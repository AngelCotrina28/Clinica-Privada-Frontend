<main class="contenedor">
  <h2 class="subtitulo-seccion">Series de Comprobantes</h2>

  <div class="caja-filtros">
    <div class="grupo-busqueda">
      <input type="text" placeholder="Buscar por serie o tipo...">
    </div>
    <div class="grupo-acciones">
      <button type="button" class="btn-accion btn-primary">+ Nueva Serie</button>
    </div>
  </div>

  <div class="tabla-responsive">
    <table>
      <thead>
        <tr>
          <th>Tipo Documento</th>
          <th>Serie</th>
          <th>Número Actual</th>
          <th>Punto de Venta</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><strong>Factura Electrónica</strong></td>
          <td>F001</td>
          <td>00000452</td>
          <td>Caja Principal</td>
          <td><span class="badge badge-activo">Activo</span></td>
          <td>
            <button class="btn-tabla">Configurar</button>
          </td>
        </tr>
        <tr>
          <td><strong>Boleta de Venta</strong></td>
          <td>B001</td>
          <td>00001289</td>
          <td>Caja Principal</td>
          <td><span class="badge badge-activo">Activo</span></td>
          <td>
            <button class="btn-tabla">Configurar</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</main>
